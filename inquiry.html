<section class="inquiry-wrap">
  <div class="wrap" style="max-width:760px;">
    <div class="section-head">
      <p class="eyebrow">Book a Walkthrough</p>
      <h2>Tell us which home you'd like to see, live or in 3D</h2>
    </div>

    <form id="inquiry-form" novalidate>
      <div class="form-grid">
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="field">
          <label for="phone">Phone</label>
          <input type="tel" id="phone">
        </div>
        <div class="field">
          <label for="property">Property</label>
          <select id="property" required>
            <option value="">Select a listing</option>
          </select>
        </div>
        <div class="field">
          <label for="tour-type">Preferred format</label>
          <select id="tour-type">
            <option value="in-person">In-person walkthrough</option>
            <option value="3d">3D remote tour</option>
            <option value="either">Either works</option>
          </select>
        </div>
        <div class="field">
          <label for="date">Preferred date</label>
          <input type="date" id="date">
        </div>
        <div class="field full">
          <label for="message">Message</label>
          <textarea id="message" rows="4" placeholder="Anything specific you'd like the agent to know?"></textarea>
        </div>
      </div>
      <button type="submit" class="btn mt-40">Send Inquiry</button>
      <div class="form-status" id="form-status"></div>
    </form>
  </div>
</section>

<footer style="margin-top:80px;">
