<section style="padding-top:150px;">
  <div class="wrap">
    <div class="section-head">
      <p class="eyebrow">All Listings</p>
      <h2>Filter homes by price, size and neighborhood</h2>
    </div>

    <form class="filters" id="filter-form">
      <div class="field">
        <label for="f-location">Location</label>
        <select id="f-location">
          <option value="">All</option>
        </select>
      </div>
      <div class="field">
        <label for="f-type">Type</label>
        <select id="f-type">
          <option value="">All</option>
        </select>
      </div>
      <div class="field">
        <label for="f-beds">Min. bedrooms</label>
        <select id="f-beds">
          <option value="0">Any</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
          <option value="4">4+</option>
          <option value="5">5+</option>
        </select>
      </div>
      <div class="field">
        <label for="f-price">Max. price</label>
        <select id="f-price">
          <option value="0">Any</option>
          <option value="2000000">$2.0M</option>
          <option value="3000000">$3.0M</option>
          <option value="5000000">$5.0M</option>
          <option value="8000000">$8.0M</option>
        </select>
      </div>
      <div class="field">
        <button type="button" class="btn ghost" id="reset-filters">Reset</button>
      </div>
    </form>

    <p class="results-count mono" id="results-count"></p>
    <div class="grid-cards" id="listings-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none;">
      No homes match those filters yet — try widening your search.
    </div>
  </div>
</section>

<footer>
  <div class="wrap">
    <div class="foot-bottom">
      <span>&copy; <span id="year"></span> Meridian Estates</span>
      <span>Mtech-Web26003</span>
    </div>
  </div>
