<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Tour — Meridian Estates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>body{ overflow:hidden; }</style>
</head>
<body>

<div class="tour-wrap">
  <canvas id="tour-canvas"></canvas>

  <div class="loading-veil" id="loading-veil">Rendering the walkthrough…</div>

  <div class="tour-ui tour-topbar">
    <a class="btn ghost on-dark" href="listings.html">&larr; Back to Listings</a>
    <div style="display:flex;gap:14px;align-items:center;">
      <div class="toggle-daynight" id="daynight-toggle" role="button" tabindex="0">
        <span id="daynight-label">Day</span>
        <span class="switch" id="daynight-switch"></span>
      </div>
      <a class="btn on-dark" href="floorplan.html">View Floor Plan</a>
    </div>
  </div>

  <div class="tour-ui tour-hint">Drag to look around · WASD or arrow keys to move · click a marker to jump in</div>

  <div class="tour-ui hotspot-card" id="hotspot-card">
    <button class="close" id="hotspot-close" aria-label="Close">&times;</button>
    <h4 id="hotspot-title">Room</h4>
    <p id="hotspot-desc">Description</p>
    <span class="tag-pill" id="hotspot-tag">Zone</span>
  </div>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="js/data.js"></script>
<script src="js/tour.js"></script>
</body>
</html>
